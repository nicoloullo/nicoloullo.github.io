<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Blue background -->
  <rect width="32" height="32" rx="5" fill="#dbeafe"/>

  <!-- Expansion fill (above trend, golden) -->
  <path d="M3,16 C6,16 7,8 11,8 C15,8 15,16 16,16 L16,16 L3,16 Z"
        fill="#fbbf24" opacity="0.25"/>

  <!-- Recession fill (below trend, red) -->
  <path d="M16,16 C17,16 17,24 21,24 C25,24 26,16 29,16 L29,16 L16,16 Z"
        fill="#f87171" opacity="0.25"/>

  <!-- Trend line -->
  <line x1="3" y1="16" x2="29" y2="16" stroke="#1e40af" stroke-width="0.7" stroke-dasharray="2,2" opacity="0.4"/>

  <!-- Business cycle wave -->
  <path d="M3,16 C6,16 7,8 11,8 C15,8 15,16 16,16 C17,16 17,24 21,24 C25,24 26,16 29,16"
        fill="none" stroke="#1e40af" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Peak dot with ring (expansion) -->
  <circle cx="11" cy="8" r="3.2" fill="#dbeafe"/>
  <circle cx="11" cy="8" r="2.2" fill="#fbbf24"/>

  <!-- Trough dot with ring (recession) -->
  <circle cx="21" cy="24" r="3.2" fill="#dbeafe"/>
  <circle cx="21" cy="24" r="2.2" fill="#f87171"/>
</svg>
